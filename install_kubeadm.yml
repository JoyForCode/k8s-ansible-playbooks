- name: Update the apt-get repository
  become: yes
  ansible.builtin.apt:
    update_cache: yes

- name: Install required packages for kubeadm
  become: yes
  ansible.builtin.apt:
    pkg:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg

- name: Ensuring keyring directory exists if not create it
  become: yes
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download the public signing key for the kubernetes package repositories.
  ansible.builtin.get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key
    dest: /tmp/kubernetes-release.key
    mode: '0644'

- name: Add the kubernetes signing key to the keyring
  become: yes
  ansible.builtin.command:
    argv:
    - gpg
    - --dearmor
    - -o
    - /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    - /tmp/kubernetes-release.key
