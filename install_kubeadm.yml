- name: K8s_playbooks
  hosts: localhost
  connection: local
  become: yes
  tasks:

    - name: Update the apt-get repository
      ansible.builtin.apt:
        update_cache: yes

    - name: Install required packages for kubeadm
      ansible.builtin.apt:
        pkg:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
        state: present

    - name: Ensuring keyring directory exists if not create it
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download the public signing key
      ansible.builtin.get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key
        dest: /tmp/kubernetes-release.key
        mode: '0644'

    - name: Add the kubernetes signing key
      ansible.builtin.command:
        argv:
          - gpg
          - --dearmor
          - -o
          - /etc/apt/keyrings/kubernetes-apt-keyring.gpg
          - /tmp/kubernetes-release.key
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add the appropriate Kubernetes apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /"
        filename: kubernetes
        state: present

    - name: Update the apt package index
      ansible.builtin.apt:
        update_cache: yes

    - name: Install kubeadm, kubelet and kubectl
      ansible.builtin.apt:
        pkg:
          - kubelet
          - kubeadm
          - kubectl
        state: present

    - name: Enable the kubelet service before running kubeadm:
      ansible.builtin.systemd_service:
        name: kubelet
        enabled: yes
        state: started