---

- name: Setup containerd, runc, and CNI
  hosts: localhost
  connection: local
  become: true

  vars:
    containerd_version: "2.2.1"
    containerd_arch: "amd64"
    containerd_os: "linux"
    runc_version: "1.4.0"
    runc_arch: "amd64"
    cni_version: "1.9.0"
    cni_arch: "amd64"
    cni_os: "linux"

  tasks:

    - name: Download containerd tarball
      ansible.builtin.get_url:
        url: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-{{ containerd_os }}-{{ containerd_arch }}.tar.gz"
        dest: "/tmp/containerd-{{ containerd_version }}.tar.gz"
        checksum: "sha256:https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-{{ containerd_os }}-{{ containerd_arch }}.tar.gz.sha256sum"
        mode: '0644'

    - name: Extract containerd tarball
      ansible.builtin.unarchive:
        src: "/tmp/containerd-{{ containerd_version }}.tar.gz"
        dest: "/usr/local"
        remote_src: yes
        creates: "/usr/local/bin/containerd"

    - name: Create systemd directory for containerd
      ansible.builtin.file:
        path: /usr/local/lib/systemd/system
        state: directory
        mode: '0755'

    - name: Download containerd systemd service file
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/containerd/containerd/main/containerd.service"
        dest: "/usr/local/lib/systemd/system/containerd.service"
        mode: '0644'

    - name: Reload systemd daemon
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Enable and start containerd service
      ansible.builtin.systemd_service:
        name: containerd
        enabled: true
        state: started

    - name: Download runc binary
      ansible.builtin.get_url:
        url: "https://github.com/opencontainers/runc/releases/download/v{{ runc_version }}/runc.{{ runc_arch }}"
        dest: "/usr/local/sbin/runc"
        mode: '0755'

    - name: Create CNI plugin directory
      ansible.builtin.file:
        path: /opt/cni/bin
        state: directory
        mode: '0755'

    - name: Download CNI plugins
      ansible.builtin.get_url:
        url: "https://github.com/containernetworking/plugins/releases/download/v{{ cni_version }}/cni-plugins-{{ cni_os }}-{{ cni_arch }}-v{{ cni_version }}.tgz"
        dest: "/tmp/cni-plugins-v{{ cni_version }}.tgz"
        checksum: "sha256:https://github.com/containernetworking/plugins/releases/download/v{{ cni_version }}/cni-plugins-{{ cni_os }}-{{ cni_arch }}-v{{ cni_version }}.tgz.sha256sum"
        mode: '0644'

    - name: Extract CNI plugins
      ansible.builtin.unarchive:
        src: "/tmp/cni-plugins-v{{ cni_version }}.tgz"
        dest: "/opt/cni/bin"
        remote_src: yes
        creates: "/opt/cni/bin/bridge"

    - name: Create containerd configuration directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: generate default containerd configuration
      ansible.builtin.shell:
        cmd: "containerd config default > /etc/containerd/config.toml"
        creates: "/etc/containerd/config.toml"

    - name: Set SystemdCgroup to true in containerd configuration
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: Restart containerd

  handlers:
    - name: Restart containerd
      ansible.builtin.systemd_service:
        name: containerd
        state: restarted
